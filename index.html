      const handleUploadToGitHub = async () => {
        const fileInput = document.getElementById('github-file-input');
        const file = fileInput?.files?.[0];
        if (!file) {
          setUploadError("Vui lòng chọn một tệp PDF để tải lên.");
          return;
        }

        if (!githubToken || !githubOwner || !githubRepo) {
          setUploadError("Vui lòng cấu hình đầy đủ: Token, Username và Repository.");
          setShowGitConfig(true);
          return;
        }

        setIsUploading(true);
        setUploadStatus("Đang mã hóa tệp PDF...");
        setUploadError("");

        try {
          const path = githubFolder ? `${githubFolder}/${file.name}` : file.name;
          const url = `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${path}`;
          
          // Convert file to base64
          const reader = new FileReader();
          const base64Promise = new Promise((resolve, reject) => {
            reader.onload = () => {
              const base64String = reader.result.split(',')[1];
              resolve(base64String);
            };
            reader.onerror = (error) => reject(error);
          });
          reader.readAsDataURL(file);
          const content = await base64Promise;
          
          setUploadStatus("Đang đối soát tệp trên GitHub...");
          let sha = undefined;
          try {
            const checkRes = await fetch(url, {
              headers: {
                'Authorization': `token ${githubToken}`
              }
            });
            if (checkRes.ok) {
              const checkData = await checkRes.json();
              sha = checkData.sha;
            }
          } catch (err) {
            console.log("Không có tệp cũ hoặc lỗi kiểm tra SHA:", err);
          }
          
          setUploadStatus("Đang đẩy tệp lên kho chứa GitHub...");
          const body = {
            message: `Upload ${file.name} via Talent AI Lens`,
            content: content,
            branch: githubBranch
          };
          if (sha) {
            body.sha = sha;
          }
          
          const uploadRes = await fetch(url, {
            method: 'PUT',
            headers: {
              'Authorization': `token ${githubToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });
          
          if (!uploadRes.ok) {
            const errorData = await uploadRes.json();
            throw new Error(errorData.message || "Lỗi phản hồi từ GitHub API");

          setGithubFiles(updatedFiles);

      const extractTextFromPDF = async (arrayBuffer) => {
        const pdfjsLib = window.pdfjsLib;
        if (!pdfjsLib) {
          throw new Error("Thư viện PDF.js chưa được tải. Vui lòng kiểm tra kết nối mạng.");
        }
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          if (!textContent.items || textContent.items.length === 0) continue;

          // Sort items: top-to-bottom (translateY desc), then left-to-right (translateX asc)
          const items = [...textContent.items];
          items.sort((a, b) => {
            const yA = a.transform[5];
            const yB = b.transform[5];
            if (Math.abs(yA - yB) > 5) {
              return yB - yA;
            }
            return a.transform[4] - b.transform[4];
          });

          let lastY = null;
          let pageText = '';
          for (const item of items) {
            const currentY = item.transform[5];
            if (lastY !== null && Math.abs(currentY - lastY) > 5) {
              pageText += '\n';
            } else if (lastY !== null) {
              pageText += ' ';
            }
            pageText += item.str;
            lastY = currentY;
          }
          text += pageText + '\n\n';
        }
        return text.trim();
      };

        const found = candidates.find(c => c.id === id);
        if (found) {
          setCvText(found.rawCVText);
          setCandidateName(found.name);
          setSelectedCandidateId(id);
          setCurrentPdfUrl(found.pdfUrl || '');
        }
      };

      const parseLocalCV = (text, name) => {
        const textLower = text.toLowerCase();
        let education = "Không đề cập";
        let experience = "Không đề cập";
        let english = "Không đề cập";
        let onsite = "Có";
        let nationality = "Việt Nam";
        let driverLicense = "Có";
        let backgroundCheck = "Có";
        let drugTest = "Có";
        let startImmediately = "Có";
        let teaching = "Không đề cập";

        let toolsScore = 70;
        let teachScore = 40;
        let teamsScore = 60;

        if (textLower.includes("cử nhân") || textLower.includes("bachelor") || textLower.includes("tốt nghiệp")) {
          education = "Cử nhân chuyên ngành Thiết kế Đồ họa / Mỹ thuật";
        }
        if (textLower.includes("thạc sĩ") || textLower.includes("master")) {
          education = "Thạc sĩ chuyên ngành Mỹ thuật công nghiệp";
        }
        if (textLower.includes("kinh nghiệm") || textLower.includes("làm việc")) {
          experience = "Có kinh nghiệm thực tế thiết kế đồ họa";
        }
        if (textLower.includes("ielts") || textLower.includes("english") || textLower.includes("tiếng anh")) {
          const m = textLower.match(/ielts\s*([0-9.]+)/i);
          english = m ? `IELTS ${m[1]} (Giao tiếp tốt)` : "Có khả năng giao tiếp tiếng Anh tốt";
        }
        if (textLower.includes("hybrid") || textLower.includes("remote") || textLower.includes("không onsite")) {
          onsite = "Không (Chỉ làm hybrid/remote)";
        }
        if (textLower.includes("hàn quốc") || textLower.includes("korean") || textLower.includes("lee")) {
          nationality = "Hàn Quốc";
        }
        if (textLower.includes("chưa có bằng lái") || textLower.includes("không có bằng lái")) {
          driverLicense = "Không (Chưa có bằng lái)";
        }
        if (textLower.includes("giảng dạy") || textLower.includes("thỉnh giảng") || textLower.includes("dạy")) {
          teaching = "Có kinh nghiệm đứng lớp thỉnh giảng";
          teachScore = 75;
        }

        const screeningResults = criteria.map(crit => {
          let passed = true;
          let valueFound = "Đạt yêu cầu";
          let reasoning = "";

          switch(crit.key) {
            case 'education':
              passed = textLower.includes("cử nhân") || textLower.includes("thạc sĩ") || textLower.includes("bachelor") || textLower.includes("master") || textLower.includes("đại học");
              valueFound = education;
              reasoning = passed ? "Có bằng cấp mỹ thuật/thiết kế." : "Không tìm thấy bằng cấp cử nhân trở lên.";
              break;
            case 'experience':
              passed = textLower.includes("kinh nghiệm") || textLower.includes("exp") || textLower.includes("làm việc");
              valueFound = experience;
              reasoning = passed ? "Có kinh nghiệm thực tế trong lĩnh vực." : "Chưa có kinh nghiệm thiết kế rõ ràng.";
              break;
            case 'english':
              passed = textLower.includes("tiếng anh") || textLower.includes("english") || textLower.includes("ielts");
              valueFound = english;
              reasoning = passed ? "Đạt chuẩn giao tiếp tiếng Anh." : "Khả năng giao tiếp tiếng Anh hạn chế.";
              break;
            case 'onsite':
              passed = onsite === "Có";
              valueFound = onsite;
              reasoning = passed ? "Đồng ý onsite 100%." : "Không đồng ý onsite 100%.";
              break;

            case 'driverLicense':
              passed = driverLicense === "Có";
              valueFound = driverLicense;
              reasoning = passed ? "Có bằng lái xe di chuyển." : "Không có bằng lái xe hợp lệ.";
              break;
            case 'backgroundCheck':
              passed = backgroundCheck === "Có";
              valueFound = backgroundCheck;
              reasoning = "Chấp nhận kiểm tra lý lịch.";
              break;
            case 'drugTest':
              passed = drugTest === "Có";
              valueFound = drugTest;
              reasoning = "Chấp nhận xét nghiệm chất.";
              break;
            case 'startImmediately':
              passed = startImmediately === "Có";
              valueFound = startImmediately;
              reasoning = "Có thể nhận việc ngay.";
              break;
            case 'teaching':
              passed = textLower.includes("dạy") || textLower.includes("giảng viên") || textLower.includes("sư phạm") || textLower.includes("mentor");
              valueFound = teaching;
              reasoning = passed ? "Đã có kinh nghiệm dạy học/cố vấn." : "Chưa có kinh nghiệm giảng dạy.";
              break;
          }

          return { criterionId: crit.id, passed, valueFound, confidence: 'High', reasoning };
        });

        const mustHaves = criteria.filter(c => c.isRequired);
        const passedMustHaves = screeningResults.filter(r => {
          const c = criteria.find(x => x.id === r.criterionId);
          return c?.isRequired && r.passed;
        }).length;

        let status = 'Passed';
        if (passedMustHaves < mustHaves.length) status = 'Rejected';
        else if (screeningResults.filter(r => !r.passed).length > 2) status = 'Partial';

        if (textLower.includes("adobe") || textLower.includes("photoshop") || textLower.includes("illustrator")) toolsScore = 85;
        if (textLower.includes("figma") || textLower.includes("sketch")) toolsScore += 5;
        if (onsite === "Có") teamsScore = 80;
        else teamsScore = 40;

        const passedCount = screeningResults.filter(r => r.passed).length;
        const matchRate = Math.round((passedCount / criteria.length) * 100);
        const finalName = name || "Ứng viên mới";

        return {
          id: `cand_${Date.now()}`,
          name: finalName,
          avatar: '👤',
          matchRate,
          status,
          role: 'Giảng viên Thiết kế Đồ họa',
          nationality,
          education,
          experience,
          teaching,
          english,
          onsite,
          driverLicense,
          backgroundCheck,
          drugTest,
          startImmediately,
          toolsScore,
          teachScore,
          teamsScore,
          pros: screeningResults.filter(r => r.passed).map(r => {
            const c = criteria.find(x => x.id === r.criterionId);
            return `${c?.name}: ${r.valueFound}`;
          }).slice(0, 4),
          cons: screeningResults.filter(r => !r.passed).map(r => {
            const c = criteria.find(x => x.id === r.criterionId);
            return `${c?.name}: ${r.reasoning}`;
          }),
          summary: `Kết quả phân tích CV của ${finalName}. Đạt ${passedCount}/${criteria.length} tiêu chí sàng lọc của Cao Đẳng Việt Mỹ. Trụ cột chuyên môn thiết kế đạt ${toolsScore}%.`,
          screeningResults,
          rawCVText: text,
          pdfUrl: currentPdfUrl || undefined
        };
      };

      const handleScreenCV = async () => {
        if (!cvText.trim()) {
          alert("Vui lòng nhập nội dung CV.");
          return;
        }

        setIsScreening(true);
        setStatusMessage("Đang quét và chấm điểm hồ sơ...");

        if (apiKey) {
          try {
            const criteriaPrompt = criteria.map((c, i) => `${i+1}. [Key: ${c.key}] (Bắt buộc: ${c.isRequired ? 'Có' : 'Không'}): ${c.name} - ${c.description}`).join('\n');
            const prompt = `
Bạn là một chuyên gia tuyển dụng cao cấp của Cao Đẳng Việt Mỹ. Hãy phân tích CV ứng viên dưới đây dựa trên danh sách tiêu chí sàng lọc:
DANH SÁCH TIÊU CHÍ SÀNG LỌC:
${criteriaPrompt}

HỒ SƠ ỨNG VIÊN (Tên: ${candidateName || 'Chưa biết'}):
---
${cvText}
---

Hãy đánh giá xem ứng viên đạt hay không đạt từng tiêu chí trên. Sau đó trả về kết quả dưới định dạng JSON duy nhất, không bọc markdown. JSON phải tuân thủ đúng cấu trúc sau:
{
  "name": "Tên đầy đủ của ứng viên",
  "matchRate": 90, // Tỷ lệ khớp tổng thể từ 0 đến 100
  "status": "Passed" | "Partial" | "Rejected",
  "nationality": "Quốc tịch phát hiện được",
  "education": "Mô tả bằng cấp của ứng viên",
  "experience": "Mô tả số năm/kinh nghiệm thiết kế",
  "teaching": "Mô tả nghiệp vụ sư phạm/đứng lớp",
  "english": "Mô tả trình độ tiếng Anh",
  "onsite": "Có hoặc Không kèm lý do",
  "driverLicense": "Có hoặc Không kèm lý do",
  "backgroundCheck": "Đồng ý hoặc không",
  "drugTest": "Đồng ý hoặc không",
  "startImmediately": "Có hoặc không",
  "toolsScore": 85, // điểm trụ cột công cụ 0-100
  "teachScore": 75, // điểm trụ cột sư phạm 0-100
  "teamsScore": 80, // điểm trụ cột hội nhập 0-100
  "pros": ["Điểm cộng 1", "Điểm cộng 2"],
  "cons": ["Điểm trừ 1", "Điểm trừ 2"],
  "summary": "Nhận xét tổng thể bằng tiếng Việt, ngắn gọn từ 3-4 câu",
  "screeningResults": [
    {
      "criterionId": "ID của tiêu chí",
      "passed": true,
      "valueFound": "Thông tin phát hiện",
      "confidence": "High",
      "reasoning": "Lý giải bằng tiếng Việt"
    }
  ]
}
`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
              })
            });

            if (!res.ok) throw new Error("Gemini API Error");
            const data = await res.json();
            const parsedData = JSON.parse(data.candidates[0].content.parts[0].text.trim());
            
            const newCand = {
              id: `cand_${Date.now()}`,
              name: parsedData.name || candidateName || "Ứng viên mới",
              avatar: '👤',
              matchRate: parsedData.matchRate || 50,
              status: parsedData.status || 'Partial',
              role: 'Giảng viên Thiết kế Đồ họa',
              nationality: parsedData.nationality || 'Chưa rõ',
              education: parsedData.education || 'Chưa rõ',
              experience: parsedData.experience || 'Chưa rõ',
              teaching: parsedData.teaching || 'Chưa rõ',
              english: parsedData.english || 'Chưa rõ',
              onsite: parsedData.onsite || 'Chưa rõ',
              driverLicense: parsedData.driverLicense || 'Chưa rõ',
              backgroundCheck: parsedData.backgroundCheck || 'Chưa rõ',
              drugTest: parsedData.drugTest || 'Chưa rõ',
              startImmediately: parsedData.startImmediately || 'Chưa rõ',
              toolsScore: parsedData.toolsScore || 70,
              teachScore: parsedData.teachScore || 50,
              teamsScore: parsedData.teamsScore || 60,
              pros: parsedData.pros || [],
              cons: parsedData.cons || [],
              summary: parsedData.summary || 'Đã phân tích.',
              screeningResults: criteria.map(crit => {
                const match = parsedData.screeningResults?.find(r => r.criterionId === crit.id || r.criterionId === crit.key);
                return {
                  criterionId: crit.id,
              passed: match ? match.passed : false,
                  valueFound: match ? match.valueFound : 'Không tìm thấy',
                  confidence: match ? match.confidence : 'Medium',
                  reasoning: match ? match.reasoning : 'Thiếu dữ liệu.'
                };
              }),
              screeningResults: screeningResults,
              rawCVText: cvText,
              pdfUrl: currentPdfUrl || undefined
            };
            onAddCandidate(newCand);
          } catch (e) {
            console.error(e);
            alert("Lỗi kết nối Gemini AI. Tự động chuyển sang quét Mock cục bộ.");
            onAddCandidate(parseLocalCV(cvText, candidateName));
          }
        } else {
          // Delay to simulate scanning
          await new Promise(resolve => setTimeout(resolve, 1200));
          onAddCandidate(parseLocalCV(cvText, candidateName));
        }

        setIsScreening(false);
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
          <div className="lg:col-span-5 space-y-6">
            <div className="bg-[#0b1120] border border-slate-800/90 rounded-xl p-5 shadow-sm">
              <h4 className="text-xs font-bold uppercase tracking-wider text-indigo-400 mb-3">Hồ Sơ Mẫu Thẩm Định</h4>
              <div className="grid grid-cols-3 gap-2">
                <button onClick={() => loadPreloaded('cand1')} className={`p-2.5 rounded-lg border text-left transition ${selectedCandidateId === 'cand1' ? 'bg-indigo-600/10 border-indigo-500/80 text-white' : 'bg-slate-950 border-slate-800/70 text-slate-400'}`}>
                  <div className="text-base mb-1">👨‍🏫</div>
                  <div className="text-[10px] font-bold truncate">N. M. Tuấn</div>
                  <div className="text-[8px] text-emerald-400 font-semibold font-mono">Khớp 96%</div>
                </button>
                <button onClick={() => loadPreloaded('cand2')} className={`p-2.5 rounded-lg border text-left transition ${selectedCandidateId === 'cand2' ? 'bg-indigo-600/10 border-indigo-500/80 text-white' : 'bg-slate-950 border-slate-800/70 text-slate-400'}`}>
                  <div className="text-base mb-1">👩‍🎨</div>
                  <div className="text-[10px] font-bold truncate">T. T. Hương</div>
                  <div className="text-[8px] text-amber-400 font-semibold font-mono">Một phần 65%</div>
                </button>
                <button onClick={() => loadPreloaded('cand3')} className={`p-2.5 rounded-lg border text-left transition ${selectedCandidateId === 'cand3' ? 'bg-indigo-600/10 border-indigo-500/80 text-white' : 'bg-slate-950 border-slate-800/70 text-slate-400'}`}>
                  <div className="text-base mb-1">👨</div>
                  <div className="text-[10px] font-bold truncate">Lee Min-Soo</div>
                  <div className="text-[8px] text-rose-400 font-semibold font-mono">Loại 45%</div>
                </button>
              </div>
            </div>

            <div className="bg-[#0b1120] border border-slate-800/90 rounded-xl p-5 shadow-sm space-y-4">
              <div className="flex items-center justify-between">
                <h4 className="text-xs font-bold uppercase tracking-wider text-slate-400">Nhập Dữ Liệu CV</h4>
                <label className="text-[10px] text-indigo-400 hover:text-indigo-300 font-bold cursor-pointer flex items-center gap-1">
                  <Upload className="w-3.5 h-3.5" />
                  <span>Tải tệp lên (.pdf, .txt)</span>
                  <input 
                    type="file" 
                    accept=".txt,.pdf" 
                    onChange={handleFileChange} 
                    className="hidden" 
                  />
                </label>
              </div>

              {/* Dropdown chọn CV từ hệ thống */}
              <div className="flex flex-col gap-1.5 bg-slate-950/40 p-3 rounded-lg border border-slate-800/50">
                <label className="text-[9px] text-indigo-400 font-bold uppercase tracking-wide">Hoặc chọn CV từ hệ thống (PDF)</label>
                <select 
                  onChange={(e) => {
                    if (e.target.value) {
                      handleLoadSamplePDF(e.target.value);
                      e.target.value = ""; // reset selection
                    }
                  }}
                  className="w-full bg-slate-950 border border-slate-850 rounded-md px-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 font-sans cursor-pointer"
                  defaultValue=""
                >
                  <option value="" disabled>-- Chọn một tệp CV mẫu --</option>
                  <optgroup label="Hồ Sơ Mẫu Mặc Định">
                    <option value="cvs/1-CV - Nhan Nguyen - Senior Graphic Designer.pdf">1. Nhân Nguyễn - Senior Graphic Designer</option>
                    <option value="cvs/2-CV_Dương Ngọc Anh Thư__Lecturer.pdf">2. Dương Ngọc Anh Thư - Lecturer</option>
                    <option value="cvs/3-CV_NguyenTuVinh_Designer.pdf">3. Nguyễn Tự Vinh - Designer</option>
                    <option value="cvs/4-Hai Nguyen CV.pdf">4. Hải Nguyễn - Graphic Designer</option>
                    <option value="cvs/5-Hai Vu Resume 2026.pdf">5. Hải Vũ - Resume 2026</option>
                    <option value="cvs/6-PORTFOLIO LUAN VU_2026_full.pdf">6. Luân Vũ - Portfolio 2026</option>
                    <option value="cvs/7-Resume_NhutNguyen.pdf">7. Nhựt Nguyễn - Resume</option>
                    <option value="cvs/8-TranquanghuyCV-0356156797.pdf">8. Trần Quang Huy - CV</option>
                  </optgroup>
                  {githubFiles.length > 0 && (
                    <optgroup label="Hồ Sơ Trên GitHub Của Bạn">
                      {githubFiles.map((file, idx) => (
                        <option key={idx} value={file.rawUrl}>{file.name}</option>

                    </optgroup>

                </select>
              </div>

              {/* Khung Đồng bộ & Upload GitHub Pages */}
              <div className="bg-slate-950/30 border border-slate-800/80 rounded-lg p-3 space-y-3">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-1.5 text-[10px] text-indigo-400 font-bold uppercase tracking-wider">
                    <Github className="w-3.5 h-3.5" />
                    <span>Upload CV Lên GitHub Pages</span>
                  </div>
                  <button

                  </button>
                </div>

                {showGitConfig && (
                  <div className="space-y-2 p-2.5 rounded bg-slate-950/60 border border-slate-900 text-xs">
                    <div className="space-y-1">
                      <label className="text-[8px] text-slate-500 font-bold uppercase block">GitHub Personal Access Token (PAT)</label>
                      <input 
                        type="password" 
                        placeholder="ghp_..." 
                        value={githubToken} 
                        onChange={(e) => { setGithubToken(e.target.value); saveGitConfig('github_token', e.target.value); }} 
                        className="w-full bg-[#080c14] border border-slate-800 rounded px-2 py-1 text-[10px] text-slate-200 focus:outline-none focus:border-indigo-500 font-mono"
                      />

                        Cần token có quyền <code className="text-indigo-400">repo</code>. Tạo tại GitHub -> Settings -> Developer Settings.
                      </p>

                      <div className="space-y-1">

                          className="w-full bg-[#080c14] border border-slate-800 rounded px-2 py-1 text-[10px] text-slate-200 focus:outline-none focus:border-indigo-500"

                        <input

                        />

                <div className="flex gap-2">
                  <input

                    className="flex-1 bg-slate-950 border border-slate-850 rounded px-2 py-1 text-[10px] text-slate-400 focus:outline-none cursor-pointer file:mr-2 file:py-0.5 file:px-1.5 file:rounded file:border-0 file:text-[9px] file:font-semibold file:bg-indigo-600/10 file:text-indigo-400 file:cursor-pointer hover:file:bg-indigo-600/20"
                  />
                  <button 
                    onClick={handleUploadToGitHub}
                    disabled={isUploading}
                    className={`px-3 py-1 rounded text-[10px] font-bold transition flex items-center gap-1.5 ${
                      isUploading 
                        ? 'bg-slate-800 text-slate-500 cursor-not-allowed' 
                        : 'bg-indigo-600 hover:bg-indigo-500 text-white'
                    }`}
                  >
                    {isUploading ? 'Đang tải...' : 'Upload'}
                  </button>
                </div>

                {uploadStatus && (
                  <div className="text-[8px] text-emerald-400 font-semibold flex items-center gap-1">
                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                    <span>{uploadStatus}</span>
                  </div>

                {uploadError && (
                  <div className="text-[8px] text-rose-400 font-semibold flex items-center gap-1">
                    <div className="w-1.5 h-1.5 rounded-full bg-rose-400"></div>
                    <span>{uploadError}</span>
                  </div>
                )}

                {githubFiles.length > 0 && (
                  <div className="space-y-1 border-t border-slate-855 pt-2 text-[9px]">

    // Markdown to HTML simple parser for printing
    const parseMarkdownToHtml = (md) => {
      if (!md) return "";
      let html = md;

      // Escape XML characters to prevent breakage
      html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      // Parse Tables
      const lines = html.split('\n');
      let inTable = false;
      let tableHeaders = [];
      let tableRows = [];
      const newLines = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('|') && line.endsWith('|')) {
          const cols = line.split('|').map(c => c.trim()).filter((c, idx, arr) => idx > 0 && idx < arr.length - 1);
          if (!inTable) {
            inTable = true;
            tableHeaders = cols;
          } else if (line.includes('---') || line.includes(':---')) {
            continue; // separator row
          } else {
            tableRows.push(cols);
          }
        } else {
          if (inTable) {
            let tableHtml = '<table class="report-table"><thead><tr>';
            tableHeaders.forEach(h => {
              tableHtml += `<th>${h}</th>`;
            });
            tableHtml += '</tr></thead><tbody>';
            tableRows.forEach(row => {
              tableHtml += '<tr>';
              row.forEach(cell => {
                let cellContent = cell;
                if (cell.includes('🟢') || cell.includes('Passed') || cell.includes('Đạt')) {
                  cellContent = `<span class="badge badge-passed">${cell}</span>`;
                } else if (cell.includes('🟡') || cell.includes('Partial') || cell.includes('Cân nhắc')) {
                  cellContent = `<span class="badge badge-partial">${cell}</span>`;
                } else if (cell.includes('🔴') || cell.includes('Rejected') || cell.includes('Loại')) {
                  cellContent = `<span class="badge badge-rejected">${cell}</span>`;
                }
                tableHtml += `<td>${cellContent}</td>`;
              });
              tableHtml += '</tr>';
            });
            tableHtml += '</tbody></table>';
            newLines.push(tableHtml);
            inTable = false;
            tableHeaders = [];
            tableRows = [];
          }
          newLines.push(lines[i]);
        }
      }
      if (inTable) {
        let tableHtml = '<table class="report-table"><thead><tr>';
        tableHeaders.forEach(h => {
          tableHtml += `<th>${h}</th>`;
        });
        tableHtml += '</tr></thead><tbody>';
        tableRows.forEach(row => {
          tableHtml += '<tr>';
          row.forEach(cell => {
            let cellContent = cell;
            if (cell.includes('🟢') || cell.includes('Passed') || cell.includes('Đạt')) {
              cellContent = `<span class="badge badge-passed">${cell}</span>`;
            } else if (cell.includes('🟡') || cell.includes('Partial') || cell.includes('Cân nhắc')) {
              cellContent = `<span class="badge badge-partial">${cell}</span>`;
            } else if (cell.includes('🔴') || cell.includes('Rejected') || cell.includes('Loại')) {
              cellContent = `<span class="badge badge-rejected">${cell}</span>`;
            }
            tableHtml += `<td>${cellContent}</td>`;
          });
          tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table>';
        newLines.push(tableHtml);
      }

      html = newLines.join('\n');

      // Headers
      html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
      html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
      html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
      html = html.replace(/^#### (.*?)$/gm, '<h4>$1</h4>');

      // Bold and Italic
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

      // Bullet Lists
      html = html.replace(/^[-\*]\s+(.*?)$/gm, '<li>$1</li>');

      // Wrap lists
      const lines2 = html.split('\n');
      let inList = false;
      const finalLines = [];
      for (let i = 0; i < lines2.length; i++) {
        const line = lines2[i];
        if (line.trim().startsWith('<li>')) {
          if (!inList) {
            finalLines.push('<ul>');
            inList = true;
          }
          finalLines.push(line);
        } else {
          if (inList) {
            finalLines.push('</ul>');
            inList = false;
          }
          finalLines.push(line);
        }
      }
      if (inList) {
        finalLines.push('</ul>');
      }

      html = finalLines.join('\n');

      // Wrap paragraphs
      const lines3 = html.split('\n');
      const paragraphs = [];
      for (let i = 0; i < lines3.length; i++) {
        const line = lines3[i].trim();
        if (!line) {
          paragraphs.push('');
          continue;
        }
        if (line.startsWith('<h') || line.startsWith('<ul') || line.startsWith('</ul') || line.startsWith('<li') || line.startsWith('<table') || line.startsWith('<thead') || line.startsWith('<tbody') || line.startsWith('<tr') || line.startsWith('<th') || line.startsWith('<td') || line.startsWith('</table') || line.startsWith('</thead') || line.startsWith('</tbody') || line.startsWith('</tr') || line.startsWith('</th') || line.startsWith('</td')) {
          paragraphs.push(lines3[i]);
        } else {
          paragraphs.push(`<p>${lines3[i]}</p>`);
        }
      }

      return paragraphs.join('\n');
    };

    // App Component (Unified)
    function App() {

          return [];
        }
      });
      const [selectedBatchId, setSelectedBatchId] = useState(() => {

          return saved || '';
        } catch (e) {
          return '';

      });
      const [isGeneratingReport, setIsGeneratingReport] = useState(false);
      const [showCreateForm, setShowCreateForm] = useState(false);
      const [newBatchName, setNewBatchName] = useState('');
      const [newBatchDesc, setNewBatchDesc] = useState('');

      const saveBatches = (newBatches) => {
        setBatches(newBatches);
        localStorage.setItem('recruitment_batches', JSON.stringify(newBatches));
      };

      const handleSelectBatch = (id) => {
        setSelectedBatchId(id);
        localStorage.setItem('recruitment_selected_batch_id', id);
      };

      const handleCreateBatch = (name, description) => {
        const newBatch = {
          id: 'batch_' + Date.now(),
          name: name || `Đợt tuyển dụng ${new Date().toLocaleDateString('vi-VN')}`,
          description: description || '',
          createdAt: new Date().toISOString(),
          candidates: [],
          report: ''
        };
        const updated = [...batches, newBatch];
        saveBatches(updated);
        handleSelectBatch(newBatch.id);
        return newBatch;
      };

      const handleDeleteBatch = (batchId) => {
        if (!confirm("Bạn có chắc chắn muốn xóa đợt tuyển dụng này và toàn bộ kết quả lưu trữ trong đó?")) return;
        const updated = batches.filter(b => b.id !== batchId);
        saveBatches(updated);
        if (selectedBatchId === batchId) {
          handleSelectBatch(updated.length > 0 ? updated[0].id : '');
        }
      };

      const handleSaveCandidateToBatch = (batchId, candidate) => {
        const updated = batches.map(b => {
          if (b.id === batchId) {
            const filteredCands = b.candidates.filter(c => c.id !== candidate.id && c.name !== candidate.name);
            return {
              ...b,
              candidates: [...filteredCands, candidate]
            };
          }
          return b;
        });
        saveBatches(updated);
      };

      const handleRemoveCandidateFromBatch = (batchId, candidateId) => {
        if (!confirm("Bạn có chắc chắn muốn xóa ứng viên này khỏi đợt tuyển dụng?")) return;
        const updated = batches.map(b => {
          if (b.id === batchId) {
            return {
              ...b,
              candidates: b.candidates.filter(c => c.id !== candidateId)
            };
          }
          return b;
        });
        saveBatches(updated);
      };

      const handleUpdateBatchReport = (batchId, reportText) => {
        const updated = batches.map(b => {
          if (b.id === batchId) {
            return {
              ...b,
              report: reportText
            };
          }
          return b;
        });
        saveBatches(updated);
      };

      const handleExportData = () => {
        const dataStr = JSON.stringify(batches, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = `talent-ai-lens-batches-${new Date().toISOString().slice(0,10)}.json`;
        
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
      };
      
      const handleImportData = (e) => {
        const fileReader = new FileReader();
        const file = e.target.files[0];
        if (!file) return;
        fileReader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (Array.isArray(parsed)) {
              const isValid = parsed.every(b => b.id && b.name && Array.isArray(b.candidates));
              if (isValid) {
                saveBatches(parsed);
                if (parsed.length > 0) {
                  handleSelectBatch(parsed[0].id);
                }
                alert("Nhập dữ liệu thành công!");
              } else {
                alert("Tệp JSON không đúng định dạng đợt tuyển dụng.");
              }
            } else {
              alert("Tệp JSON phải chứa danh sách các đợt tuyển dụng.");
            }
          } catch (err) {
            alert("Lỗi đọc tệp: " + err.message);
          }
        };
        fileReader.readAsText(file);
      };

      const generateOfflineReport = (batch) => {
        const total = batch.candidates.length;
        const passed = batch.candidates.filter(c => c.status === 'Passed').length;
        const partial = batch.candidates.filter(c => c.status === 'Partial').length;
        const rejected = batch.candidates.filter(c => c.status === 'Rejected').length;
        const sortedCands = [...batch.candidates].sort((a, b) => b.matchRate - a.matchRate);
        
        let md = `# BÁO CÁO KẾT QUẢ SÀNG LỌC HỒ SƠ\n`;
        md += `## Đợt tuyển dụng: ${batch.name}\n`;
        if (batch.description) md += `*Mô tả: ${batch.description}*\n`;
        md += `*Thời gian lập báo cáo: ${new Date().toLocaleDateString('vi-VN')}*\n\n`;
        
        md += `### 1. Tổng quan đợt tuyển dụng\n`;
        md += `- **Tổng số ứng viên đã quét**: ${total}\n`;
        md += `- **Đạt yêu cầu (Passed)**: ${passed} (${Math.round(passed/total*100 || 0)}%)\n`;
        md += `- **Cần xem xét thêm (Partial)**: ${partial} (${Math.round(partial/total*100 || 0)}%)\n`;
        md += `- **Không phù hợp (Rejected)**: ${rejected} (${Math.round(rejected/total*100 || 0)}%)\n\n`;
        
        md += `### 2. Danh sách so sánh ứng viên\n\n`;
        md += `| Họ và tên | Vị trí | Độ trùng khớp | Trạng thái | Tools | Teach | Teams |\n`;
        md += `| :--- | :--- | :---: | :---: | :---: | :---: | :---: |\n`;
        sortedCands.forEach(c => {
          const statusText = c.status === 'Passed' ? '🟢 Đạt' : c.status === 'Partial' ? '🟡 Cân nhắc' : '🔴 Loại';
          md += `| ${c.name} | ${c.role} | ${c.matchRate}% | ${statusText} | ${c.toolsScore}% | ${c.teachScore}% | ${c.teamsScore}% |\n`;
        });
        md += `\n`;
        
        md += `### 3. Đánh giá chi tiết & Đề xuất hành động\n\n`;
        sortedCands.forEach(c => {
          md += `#### 👤 ${c.name} (${c.matchRate}% - ${c.status === 'Passed' ? 'Đạt' : c.status === 'Partial' ? 'Cân nhắc' : 'Loại'})\n`;
          md += `- **Tóm tắt chuyên môn**: ${c.summary}\n`;
          md += `- **Điểm mạnh**: ${c.pros.join(', ') || 'Chưa ghi nhận'}\n`;
          md += `- **Cảnh báo/Hạn chế**: ${c.cons.join(', ') || 'Không có cảnh báo nghiêm trọng'}\n`;
          if (c.status === 'Passed') {
            md += `- **Khuyến nghị**: Mời tham gia vòng phỏng vấn chuyên môn ngay lập tức.\n`;
          } else if (c.status === 'Partial') {
            md += `- **Khuyến nghị**: Cần đánh giá kỹ năng chuyên môn hoặc hồ sơ bổ sung trước khi đưa ra quyết định.\n`;
          } else {
            md += `- **Khuyến nghị**: Loại khỏi danh sách phỏng vấn do không đạt các điều kiện bắt buộc.\n`;
          }
          md += `\n`;
        });
        
        md += `### 4. Kết luận chung & Kế hoạch tiếp theo\n`;
        md += `- Lập lịch phỏng vấn cho nhóm ứng viên **Đạt** sớm nhất.\n`;
        md += `- Liên hệ nhóm **Cân nhắc** nếu cần bổ sung chỉ tiêu.\n`;
        md += `- Lưu trữ nhóm **Loại** vào kho dữ liệu tham khảo sau.\n`;
        
        return md;
      };

      const handleGenerateBatchReport = async (batchId) => {
        const batch = batches.find(b => b.id === batchId);
        if (!batch) return;
        if (batch.candidates.length === 0) {
          alert("Không có ứng viên nào để lập báo cáo. Hãy quay lại Phân Tích CV và lưu ứng viên vào đợt tuyển dụng này.");
          return;
        }

        if (!apiKey) {
          // Fallback template
          const reportText = generateOfflineReport(batch);
          handleUpdateBatchReport(batchId, reportText);
          return;
        }

        setIsGeneratingReport(true);
        try {
          const candidateSummaryList = batch.candidates.map((c, index) => {
            return `${index + 1}. Họ tên: ${c.name}
- Vị trí: ${c.role}
- Trạng thái: ${c.status === 'Passed' ? 'Đạt (Passed)' : c.status === 'Partial' ? 'Cân nhắc (Partial)' : 'Loại (Rejected)'}
- Độ trùng khớp: ${c.matchRate}%
- Điểm Tools: ${c.toolsScore}%, Teach: ${c.teachScore}%, Teams: ${c.teamsScore}%
- Tóm tắt: ${c.summary}
- Điểm mạnh: ${c.pros.join(', ')}
- Điểm yếu/Cảnh báo: ${c.cons.join(', ')}`;
          }).join('\n\n');

          const prompt = `Bạn là một chuyên gia tuyển dụng cao cấp của trường Cao Đẳng Việt Mỹ.
Hãy lập một báo cáo tuyển dụng chuyên nghiệp bằng tiếng Việt (định dạng Markdown) cho đợt tuyển dụng: "${batch.name}".
Mô tả đợt tuyển dụng: ${batch.description || 'Không có mô tả'}

Dưới đây là danh sách ứng viên đã được sàng lọc trong đợt tuyển dụng này:
${candidateSummaryList}

Yêu cầu báo cáo phải bao gồm:
1. **Tổng quan đợt tuyển dụng**: Số lượng ứng viên, tỷ lệ Đạt/Cân nhắc/Loại, nhận xét chung về chất lượng hồ sơ nhận được.
2. **Bảng so sánh tổng hợp ứng viên** (dạng bảng Markdown: Họ tên, Vị trí, Độ trùng khớp, Trạng thái quyết định).
3. **Đánh giá chi tiết từng ứng viên**: Phân tích ngắn gọn điểm mạnh, điểm yếu và mức độ phù hợp với tiêu chuẩn 3 trụ cột (Tools - Nghiệp vụ chuyên môn/Công cụ, Teach - Nghiệp vụ sư phạm, Teams - Hội nhập/Lý lịch).
4. **Đề xuất & Khuyến nghị tiếp theo**: Ai nên được mời phỏng vấn ngay, ai cần kiểm tra thêm, lộ trình tiếp theo của đợt tuyển dụng.

Viết báo cáo chuyên nghiệp, rõ ràng bằng tiếng Việt, định dạng chuẩn Markdown.`;

          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          });

          if (!res.ok) throw new Error(`Lỗi Gemini API: HTTP ${res.status}`);
          const data = await res.json();
          const reportText = data.candidates[0].content.parts[0].text.trim();
          handleUpdateBatchReport(batchId, reportText);

        } catch (err) {
          console.error("Lỗi tạo báo cáo AI:", err);
          alert("Lỗi kết nối Gemini AI. Đã tự động tạo báo cáo theo mẫu cục bộ.");
          const reportText = generateOfflineReport(batch);
          handleUpdateBatchReport(batchId, reportText);
        } finally {
          setIsGeneratingReport(false);
        }
      };

      const handleSaveApiKey = (key) => {
        setApiKey(key);
        localStorage.setItem('gemini_api_key', key);
        setShowSettings(false);
      };

      const handleAddCandidate = (cand) => {
        setCandidates(prev => {
          const f = prev.filter(c => c.name !== cand.name);
          return [...f, cand];
        });
        setSelectedCandidateId(cand.id);
      };

      const selectedCandidate = candidates.find(c => c.id === selectedCandidateId) || candidates[0];

      const totalCands = candidates.length;
      const passedCands = candidates.filter(c => c.status === 'Passed').length;
      const partialCands = candidates.filter(c => c.status === 'Partial').length;
      const failedCands = candidates.filter(c => c.status === 'Rejected').length;
      const avgRate = Math.round(candidates.reduce((a, c) => a + c.matchRate, 0) / (totalCands || 1));

      return (
        <div className="flex flex-col min-h-screen bg-[#080c14] text-slate-100 font-sans">
          
          <header className="sticky top-0 z-40 w-full border-b border-slate-800 bg-[#0b101c]/80 backdrop-blur-md px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 via-indigo-500 to-emerald-400 flex items-center justify-center shadow-lg">
                <Sparkles className="w-5 h-5 text-white animate-pulse" />
              </div>
              <div>
                <div className="flex items-center gap-2">
                  <h1 className="text-lg font-bold tracking-tight text-white">TALENT AI LENS</h1>
                  <span className="px-2 py-0.5 text-[10px] font-bold rounded bg-indigo-500/20 text-indigo-300 border border-indigo-500/30">PRO v1.2</span>
                  <span className="px-2 py-0.5 text-[10px] font-semibold rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">VIỆT MỸ COLLEGE</span>
                </div>
                <p className="text-xs text-slate-400">Hệ thống phân tích và lọc hồ sơ giảng viên thông minh</p>
              </div>
            </div>

            <div className="flex items-center gap-4">
              <nav className="flex items-center bg-slate-900/60 p-1 rounded-lg border border-slate-800">
                <button onClick={() => setActiveTab('overview')} className={`px-4 py-1.5 rounded-md text-xs font-semibold transition-all ${activeTab === 'overview' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Đối Sánh & Biểu Đồ</button>
                <button onClick={() => setActiveTab('criteria')} className={`px-4 py-1.5 rounded-md text-xs font-semibold transition-all ${activeTab === 'criteria' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Tiêu Chí Sàng Lọc</button>
                <button onClick={() => setActiveTab('screener')} className={`px-4 py-1.5 rounded-md text-xs font-semibold transition-all ${activeTab === 'screener' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Phân Tích CV</button>
                <button onClick={() => setActiveTab('batches')} className={`px-4 py-1.5 rounded-md text-xs font-semibold transition-all ${activeTab === 'batches' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Đợt Tuyển Dụng & Báo Cáo</button>
              </nav>
              <button onClick={() => setShowSettings(!showSettings)} className="p-2 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white" title="Cài đặt API Key">
                <Settings className="w-4 h-4" />
              </button>
            </div>
          </header>

          {showSettings && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="w-full max-w-md bg-[#0f172a] rounded-xl border border-slate-800 p-6 shadow-2xl">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2">
                    <Key className="w-5 h-5 text-indigo-400" />
                    <h3 className="text-base font-bold text-white">Cài đặt Gemini API Key</h3>
                  </div>
                  <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-white">✕</button>
                </div>
                <p className="text-xs text-slate-400 mb-4">Nhập mã API Key Gemini của bạn để kích hoạt chấm điểm trực tiếp. Nếu không có khóa, hệ thống sử dụng bộ phân tích mock chất lượng cao.</p>
                <input type="password" placeholder="AIzaSy..." id="api-key-input" defaultValue={apiKey} className="w-full bg-[#080c14] border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-205 focus:outline-none focus:border-indigo-500 mb-5 font-mono" />
                <div className="flex justify-end gap-3 text-xs font-semibold">
                  <button onClick={() => setShowSettings(false)} className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300">Hủy</button>
                  <button onClick={() => {
                    const v = document.getElementById('api-key-input').value;
                    handleSaveApiKey(v);
                  }} className="px-4 py-2 rounded-lg bg-indigo-600 text-white">Lưu Khóa API</button>
                </div>
              </div>
            </div>
          )}

          <main className="flex-1 p-6 max-w-[1600px] w-full mx-auto space-y-6">
            
            <section className="grid grid-cols-2 md:grid-cols-5 gap-4">
              <div className="bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex flex-col justify-between shadow-sm bento-card">
                <div className="flex items-center justify-between text-slate-500"><span className="text-xs font-bold uppercase tracking-wider">Tổng Ứng Viên</span><Users className="w-4 h-4 text-indigo-400" /></div>
                <div className="mt-2 flex items-baseline gap-2"><span className="text-3xl font-black text-white font-mono">{totalCands}</span></div>
              </div>
              <div className="bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex flex-col justify-between shadow-sm bento-card">
                <div className="flex items-center justify-between text-slate-500"><span className="text-xs font-bold uppercase tracking-wider text-emerald-400">Rất Phù Hợp</span><CheckCircle2 className="w-4 h-4 text-emerald-400" /></div>
                <div className="mt-2 flex items-baseline gap-2"><span className="text-3xl font-black text-emerald-400 font-mono">{passedCands}</span><span className="text-xs font-semibold text-emerald-500">{Math.round((passedCands/totalCands)*100)}%</span></div>
              </div>
              <div className="bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex flex-col justify-between shadow-sm bento-card">
                <div className="flex items-center justify-between text-slate-500"><span className="text-xs font-bold uppercase tracking-wider text-amber-400">Một phần</span><AlertCircle className="w-4 h-4 text-amber-400" /></div>
                <div className="mt-2 flex items-baseline gap-2"><span className="text-3xl font-black text-amber-400 font-mono">{partialCands}</span><span className="text-xs font-semibold text-amber-500">{Math.round((partialCands/totalCands)*100)}%</span></div>
              </div>
              <div className="bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex flex-col justify-between shadow-sm bento-card">
                <div className="flex items-center justify-between text-slate-500"><span className="text-xs font-bold uppercase tracking-wider text-rose-500">Không Phù Hợp</span><XCircle className="w-4 h-4 text-rose-500" /></div>
                <div className="mt-2 flex items-baseline gap-2"><span className="text-3xl font-black text-rose-500 font-mono">{failedCands}</span><span className="text-xs font-semibold text-rose-500">{Math.round((failedCands/totalCands)*100)}%</span></div>
              </div>
              <div className="bg-slate-900/40 border border-slate-800/80 rounded-xl p-4 flex flex-col justify-between shadow-sm bento-card">
                <div className="flex items-center justify-between text-slate-500"><span className="text-xs font-bold uppercase tracking-wider">Khớp Chỉ Số TB</span><Layers className="w-4 h-4 text-emerald-400" /></div>
                <div className="mt-2 flex items-baseline gap-2"><span className="text-3xl font-black text-white font-mono glow-text-emerald">{avgRate}%</span></div>
              </div>
            </section>

            {activeTab === 'overview' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div className="lg:col-span-2 bg-[#0b1120] border border-slate-800/90 rounded-xl p-6 shadow-sm">
                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
                    <div>
                      <h3 className="text-base font-bold text-white">Biểu đồ Đối sánh Trụ cột (Tools - Teach - Teams)</h3>
                      <p className="text-xs text-slate-400">Phân tích năng lực chuyên môn, sư phạm và sự tương hợp lý lịch</p>
                    </div>
                    <div className="flex items-center gap-1 bg-slate-900 p-1 rounded-lg border border-slate-800 text-xs">
                      <button onClick={() => setChartFilter('all')} className={`px-3 py-1 rounded transition-all ${chartFilter === 'all' ? 'bg-indigo-600 text-white font-semibold' : 'text-slate-400'}`}>Tất cả (Side-by-Side)</button>
                      <button onClick={() => setChartFilter('tools')} className={`px-3 py-1 rounded transition-all ${chartFilter === 'tools' ? 'bg-[#6366f1] text-white font-semibold' : 'text-slate-400'}`}>Tools</button>
                      <button onClick={() => setChartFilter('teach')} className={`px-3 py-1 rounded transition-all ${chartFilter === 'teach' ? 'bg-[#10b981] text-white font-semibold' : 'text-slate-400'}`}>Teach</button>
                      <button onClick={() => setChartFilter('teams')} className={`px-3 py-1 rounded transition-all ${chartFilter === 'teams' ? 'bg-[#f59e0b] text-white font-semibold' : 'text-slate-400'}`}>Teams</button>
                    </div>
                  </div>

                  <div className="w-full h-80 relative bg-slate-950/40 rounded-xl border border-slate-900/60 p-4 flex items-center justify-center">
                    <svg viewBox="0 0 600 300" className="w-full h-full">
                      {[0, 25, 50, 75, 100].map(val => {
                        const y = 250 - (val * 2);
                        return (
                          <g key={val}>
                            <line x1="50" y1={y} x2="560" y2={y} stroke="#1e293b" strokeWidth="1" strokeDasharray="3,3" />
                            <text x="25" y={y + 4} fill="#64748b" fontSize="10" className="font-mono">{val}%</text>
                          </g>
                        );
                      })}

                      {candidates.map((cand, idx) => {
                        const groupWidth = 140;
                        const startX = 75 + idx * (groupWidth + 30);
                        const isHovered = hoveredCandidateId === cand.id;
                        const isSelected = selectedCandidateId === cand.id;

                        const toolsH = cand.toolsScore * 2;
                        const teachH = cand.teachScore * 2;
                        const teamsH = cand.teamsScore * 2;

                        const singleBarWidth = chartFilter === 'all' ? 24 : 60;

                        return (
                          <g key={cand.id} onMouseEnter={() => setHoveredCandidateId(cand.id)} onMouseLeave={() => setHoveredCandidateId(null)} onClick={() => setSelectedCandidateId(cand.id)} className="cursor-pointer">
                            {(isHovered || isSelected) && (
                              <rect x={startX - 10} y="30" width={groupWidth + 20} height="230" fill="rgba(99, 102, 241, 0.04)" stroke={isSelected ? 'rgba(99, 102, 241, 0.2)' : 'transparent'} rx="8" />
                            )}
                            <text x={startX + groupWidth / 2} y="275" textAnchor="middle" fill={isSelected ? '#ffffff' : '#94a3b8'} fontSize="11" fontWeight={isSelected ? 'bold' : 'normal'}>
                              {cand.name.split(' ').slice(-2).join(' ')}
                            </text>

                            {chartFilter === 'all' ? (
                              <g>
                                <rect x={startX} y={250 - toolsH} width={24} height={toolsH} fill="url(#toolsGrad)" rx="3" opacity={hoveredCandidateId && hoveredCandidateId !== cand.id ? 0.4 : 1} />
                                <rect x={startX + 30} y={250 - teachH} width={24} height={teachH} fill="url(#teachGrad)" rx="3" opacity={hoveredCandidateId && hoveredCandidateId !== cand.id ? 0.4 : 1} />
                                <rect x={startX + 60} y={250 - teamsH} width={24} height={teamsH} fill="url(#teamsGrad)" rx="3" opacity={hoveredCandidateId && hoveredCandidateId !== cand.id ? 0.4 : 1} />
                                {(isHovered || isSelected) && (
                                  <g>
                                    <text x={startX + 12} y={244 - toolsH} textAnchor="middle" fill="#818cf8" fontSize="9" fontWeight="bold" className="font-mono">{cand.toolsScore}</text>
                                    <text x={startX + 42} y={244 - teachH} textAnchor="middle" fill="#34d399" fontSize="9" fontWeight="bold" className="font-mono">{cand.teachScore}</text>
                                    <text x={startX + 72} y={244 - teamsH} textAnchor="middle" fill="#fbbf24" fontSize="9" fontWeight="bold" className="font-mono">{cand.teamsScore}</text>
                                  </g>
                                )}
                              </g>
                            ) : (
                              <g>
                                {chartFilter === 'tools' && <rect x={startX + groupWidth / 2 - 30} y={250 - toolsH} width={60} height={toolsH} fill="url(#toolsGrad)" rx="4" />}
                                {chartFilter === 'teach' && <rect x={startX + groupWidth / 2 - 30} y={250 - teachH} width={60} height={teachH} fill="url(#teachGrad)" rx="4" />}
                                {chartFilter === 'teams' && <rect x={startX + groupWidth / 2 - 30} y={250 - teamsH} width={60} height={teamsH} fill="url(#teamsGrad)" rx="4" />}
                                <text x={startX + groupWidth / 2} y={(chartFilter === 'tools' ? 242-toolsH : chartFilter === 'teach' ? 242-teachH : 242-teamsH)} textAnchor="middle" fill={chartFilter === 'tools' ? '#818cf8' : chartFilter === 'teach' ? '#34d399' : '#fbbf24'} fontSize="11" fontWeight="bold" className="font-mono">
                                  {chartFilter === 'tools' ? cand.toolsScore : chartFilter === 'teach' ? cand.teachScore : cand.teamsScore}%
                                </text>
                              </g>
                            )}
                          </g>
                        );
